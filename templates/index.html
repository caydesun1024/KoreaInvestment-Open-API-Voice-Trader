<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice-Trader</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎙️ AI Voice-Trader</h1>
            <p class="subtitle">종목명을 말하거나 입력하세요</p>
        </header>

        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="textInput" placeholder="예: 삼성전자 얼마야?" onkeypress="handleKeyPress(event)">
                <button id="micBtn" class="icon-btn" onclick="toggleRecording()" title="음성 인식">
                    <i class="fas fa-microphone"></i>
                </button>
                <button id="sendBtn" class="icon-btn primary" onclick="sendText()" title="검색">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
        
        <div id="status" class="status-bar" style="display:none;">
            <div class="spinner"></div>
            <span id="statusText">듣고 있습니다...</span>
        </div>

        <div id="resultArea" class="result-card" style="display:none;">
            <div class="result-header">
                <span id="pathTag" class="badge">Regex</span>
                <p id="recognizedText"></p>
            </div>
            <div class="result-body">
                <h2 id="stockName">종목명</h2>
                <div class="price-container">
                    <span id="stockPrice" class="price">0</span>
                    <span class="currency">원</span>
                </div>
            </div>
            <div class="result-footer">
                <span id="latency">소요시간: 0.5s</span>
            </div>
        </div>
    </div>

    <script>
        let mediaRecorder, audioContext, analyser, silenceStart = null;
        let audioChunks = [];
        let isSpeakingStarted = false;
        const SILENCE_THRESHOLD = 0.01;
        const INITIAL_SILENCE_LIMIT = 8000; 
        const NORMAL_SILENCE_LIMIT = 1500;

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendText();
        }

        async function sendText() {
            const textInput = document.getElementById("textInput");
            const text = textInput.value.trim();
            if (!text) return;

            showStatus("AI 분석 중...");
            try {
                const res = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });
                const data = await res.json();
                displayResult(data);
            } catch (e) {
                alert("오류가 발생했습니다.");
            } finally {
                hideStatus();
            }
        }

        async function toggleRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                source.connect(analyser);

                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                isSpeakingStarted = false;
                silenceStart = null;

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    if (audioChunks.length > 0) {
                        const blob = new Blob(audioChunks, { type: 'audio/wav' });
                        if (blob.size > 2000) sendAudio(blob);
                    }
                    stream.getTracks().forEach(t => t.stop());
                    audioContext.close();
                    setMicUI(false);
                };

                mediaRecorder.start();
                setMicUI(true);
                showStatus("듣고 있습니다...");
                checkSilence();
            } catch (e) {
                alert("마이크 접근 권한이 필요합니다.");
            }
        }

        function setMicUI(active) {
            const btn = document.getElementById("micBtn");
            if (active) {
                btn.classList.add("recording");
                btn.innerHTML = '<i class="fas fa-stop"></i>';
            } else {
                btn.classList.remove("recording");
                btn.innerHTML = '<i class="fas fa-microphone"></i>';
            }
        }

        function checkSilence() {
            const data = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(data);
            let sum = 0;
            for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
            const rms = Math.sqrt(sum / data.length);

            if (rms > SILENCE_THRESHOLD) {
                if (!isSpeakingStarted) isSpeakingStarted = true;
                silenceStart = null; 
            } else {
                if (!silenceStart) silenceStart = Date.now();
                const limit = isSpeakingStarted ? NORMAL_SILENCE_LIMIT : INITIAL_SILENCE_LIMIT;
                if (Date.now() - silenceStart > limit) {
                    mediaRecorder.stop();
                    return;
                }
            }
            if (mediaRecorder.state === "recording") requestAnimationFrame(checkSilence);
        }

        async function sendAudio(blob) {
            showStatus("음성 변환 및 분석 중...");
            const fd = new FormData(); fd.append("file", blob);
            try {
                const res = await fetch("/whisper-ask", { method: "POST", body: fd });
                const data = await res.json();
                displayResult(data);
            } catch (e) {
                alert("분석 중 오류가 발생했습니다.");
            } finally {
                hideStatus();
            }
        }

        function displayResult(data) {
            if (data.status === "success") {
                document.getElementById("resultArea").style.display = "block";
                document.getElementById("recognizedText").innerText = `"${data.text}"`;
                document.getElementById("stockName").innerText = data.name;
                document.getElementById("stockPrice").innerText = data.price;
                document.getElementById("pathTag").innerText = data.path;
                document.getElementById("latency").innerText = `소요시간: ${data.latency}s`;
                
                // 검색창 비우기
                document.getElementById("textInput").value = "";
            } else {
                alert(data.message);
            }
        }

        function showStatus(text) {
            document.getElementById("status").style.display = "flex";
            document.getElementById("statusText").innerText = text;
        }

        function hideStatus() {
            document.getElementById("status").style.display = "none";
        }
    </script>
</body>
</html>
