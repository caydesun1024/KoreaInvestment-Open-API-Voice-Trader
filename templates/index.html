<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정환의 AI Voice-Trader v3.3</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>🎙️ AI Voice-Trader</h1>
        <button id="micBtn" onclick="toggleRecording()" style="padding:20px; font-size:1.2rem; border-radius:50px; background:#ff4757; color:white; border:none; cursor:pointer;">
            🎤 말하기 시작
        </button>
        
        <div id="status" style="display:none; margin-top:20px; color:#3498db; font-weight:bold;">
            <span id="statusText">듣고 있습니다...</span>
        </div>

        <div id="resultArea" style="display:none; margin-top:30px; padding:20px; border:1px solid #ddd; border-radius:10px;">
            <p id="recognizedText" style="color:#888;"></p>
            <h2 id="stockName"></h2>
            <div id="stockPrice" style="font-size:2rem; font-weight:bold; color:#e74c3c;"></div>
            <p id="latency" style="font-size:0.8rem; color:#aaa;"></p>
        </div>
    </div>

    <script>
        let mediaRecorder, audioContext, analyser, silenceStart = null;
        let audioChunks = [];
        let isSpeakingStarted = false;
        const SILENCE_THRESHOLD = 0.01;
        const INITIAL_SILENCE_LIMIT = 10000; // 10초
        const NORMAL_SILENCE_LIMIT = 2000;   // 2초

        async function toggleRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            source.connect(analyser);

            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            isSpeakingStarted = false;
            silenceStart = null;

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                if (audioChunks.length > 0) {
                    const blob = new Blob(audioChunks, { type: 'audio/wav' });
                    if (blob.size > 2000) sendAudio(blob);
                }
                stream.getTracks().forEach(t => t.stop());
                audioContext.close();
                document.getElementById("micBtn").innerText = "🎤 말하기 시작";
                document.getElementById("micBtn").style.background = "#ff4757";
            };

            mediaRecorder.start();
            document.getElementById("micBtn").innerText = "🛑 듣는 중... (10초 대기)";
            document.getElementById("micBtn").style.background = "#2ed573";
            document.getElementById("status").style.display = "block";
            checkSilence();
        }

        function checkSilence() {
            const data = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(data);
            let sum = 0;
            for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
            const rms = Math.sqrt(sum / data.length);

            if (rms > SILENCE_THRESHOLD) {
                if (!isSpeakingStarted) {
                    isSpeakingStarted = true;
                    document.getElementById("micBtn").innerText = "🛑 듣는 중... (말을 끝내보세요)";
                }
                silenceStart = null; 
            } else {
                if (!silenceStart) silenceStart = Date.now();
                const limit = isSpeakingStarted ? NORMAL_SILENCE_LIMIT : INITIAL_SILENCE_LIMIT;
                if (Date.now() - silenceStart > limit) {
                    mediaRecorder.stop();
                    return;
                }
            }
            if (mediaRecorder.state === "recording") requestAnimationFrame(checkSilence);
        }

        async function sendAudio(blob) {
            document.getElementById("statusText").innerText = "AI 분석 중...";
            const fd = new FormData(); fd.append("file", blob);
            const res = await fetch("/whisper-ask", { method: "POST", body: fd });
            const data = await res.json();
            
            if (data.status === "success") {
                document.getElementById("resultArea").style.display = "block";
                document.getElementById("recognizedText").innerText = `"${data.text}"`;
                document.getElementById("stockName").innerText = data.name;
                document.getElementById("stockPrice").innerText = data.price + "원";
                document.getElementById("latency").innerText = `경로: ${data.path}`;
            } else {
                alert(data.message);
            }
            document.getElementById("status").style.display = "none";
        }
    </script>
</body>
</html>
