<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정환의 AI 트레이더</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* 로딩 스피너 스타일 */
        .loader {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading { text-align: center; color: #3498db; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Stock Assistant</h1>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="예: 삼전 10주 사줘" onkeypress="if(event.keyCode==13) sendQuery()">
            <button id="sendBtn" onclick="sendQuery()">질문하기</button>
        </div>

        <div id="loading" style="display:none;">
            <div class="loader"></div>
            <p>RTX 3080이 분석 중입니다... (약 9초)</p>
        </div>

        <div id="resultArea" class="result-card" style="display: none">
            <h2 id="stockName"></h2>
            <div class="price-val"><span id="stockPrice"></span>원</div>
            <div id="stockChange" class="change-val"></div>
            <div id="latency" style="font-size: 0.8rem; color: gray; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        async function sendQuery() {
            const text = document.getElementById("userInput").value;
            const btn = document.getElementById("sendBtn");
            const loading = document.getElementById("loading");
            const resArea = document.getElementById("resultArea");

            if (!text) return;

            // UI 상태 변경 (로딩 시작)
            btn.disabled = true;
            loading.style.display = "block";
            resArea.style.display = "none";

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text }),
                });

                const data = await response.json();

                if (data.status === "success") {
                    resArea.style.display = "block";
                    document.getElementById("stockName").innerText = data.name;
                    document.getElementById("stockPrice").innerText = data.price;
                    document.getElementById("latency").innerText = `AI 응답 속도: ${data.latency}`;
                    
                    const changeEl = document.getElementById("stockChange");
                    changeEl.innerText = (data.sign <= "2" ? "▲ " : "▼ ") + data.change;
                    changeEl.className = "change-val " + (data.sign <= "2" ? "up" : "down");
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert("서버 연결 실패!");
            } finally {
                // UI 상태 변경 (로딩 종료)
                btn.disabled = false;
                loading.style.display = "none";
            }
        }
    </script>
</body>
</html>
